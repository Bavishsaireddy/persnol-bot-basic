# ── Telegram ──────────────────────────────────────────────────
# ── Resume ────────────────────────────────────────────────────
# Controls what is shown when a visitor asks to see the resume.
# Set url to a public PDF link (Google Drive, Dropbox, etc.) so the bot
# can also share a download link alongside the formatted text.
resume:
  url: ""                             # optional: public PDF link e.g. https://drive.google.com/...
  show_email: true                    # include contact email in resume display
  show_phone: false                   # set true if you want phone shown

# ── Telegram ──────────────────────────────────────────────────
telegram:
  enabled: true
  parse_mode: "Markdown"
  session_prefix: "telegram"          # session IDs look like "telegram-<chat_id>"
  commands:
    - "/start"                        # commands handled before sending to LLM
  start_message: |
    Hey! I'm Bavish's AI agent.
    Ask me anything about his work, stack, projects, or experience.
