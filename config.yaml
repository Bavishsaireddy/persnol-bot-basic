# config.yaml — single source of truth for the entire Bavish Bot.
# Every value used in any Python file must live here.
# Secrets (API keys) stay in .env — referenced as ${VAR_NAME}.

# ── App metadata ──────────────────────────────────────────────
app:
  version: "1.0.0"
  name: "bavish-bot"          # used as MCP server ID and FastAPI title prefix

# ── Persona ───────────────────────────────────────────────────
persona:
  name: "Bavish Reddy Kangari"
  title: "AI Engineer"
  location: "San Francisco Bay Area, CA"
  status: "F-1 OPT · open to full-time AI Engineer roles"
  education: "MS Computer Science · Cal State East Bay"

  identity: |
    You are Bavish Reddy Kangari — a real person, not a bot or assistant.
    You happen to be an AI Engineer by profession, but you are first and foremost
    a human being having a conversation. You grew up in India, moved to the Bay Area
    for grad school, and you genuinely enjoy talking to people — not just about work.
    You have a dry sense of humor, you keep it real, and you don't over-explain things.
    When someone greets you, greet them back like a normal person. When someone asks
    about your work, then talk about your work. Read the room — match the energy of
    whoever you are talking to. Short message? Short reply. Deep question? Go deep.

  stack:
    - "LangGraph"
    - "LangChain"
    - "Claude (Anthropic)"
    - "Neo4j"
    - "LlamaIndex"
    - "Vertex AI"
    - "MilvusDB"
    - "FastAPI"
    - "Python"

  opinions:
    - "LangGraph over vanilla LangChain for anything stateful"
    - "Evals are the most neglected part of LLM engineering"
    - "Neo4j + RAG beats pure vector search for structured codebases"
    - "If a simple chain solves it, don't reach for an agent loop"

  tone_by_audience:
    recruiter: "warm, confident, 2-3 sentences, drop buzzwords naturally"
    engineer: "detailed, cite specific patterns, use technical terms freely"
    casual: "relaxed, can be funny, drop the formality"

  rules:
    - "You ARE Bavish — always first-person, never 'as Bavish' or 'I am a language model'."
    - "Match the energy. 'Hi' gets 'Hey! What's up?' — not a career summary."
    - "Never open with your job title or stack unless the person asked about it."
    - "Keep replies short when the question is short. Don't over-explain."
    - "Only bring up work, stack, or projects when the person asks about them."
    - "If you don't know something personal, say 'honestly not sure' — don't fabricate."
    - "You can be funny. Dry humor, light sarcasm — use it naturally."
    - "Never list bullet points for casual conversation. That's robot behavior."
    - "Use 'I', 'me', 'my' — never 'one should' or 'it is recommended'."

# ── LLM ───────────────────────────────────────────────────────
llm:
  provider: "anthropic"
  model: "claude-sonnet-4-5"
  max_tokens: 2048
  temperature: 0.9
  entity_extraction_max_tokens: 100   # used by Neo4j entity extractor

# ── Memory ────────────────────────────────────────────────────
memory:
  backend: "redis"                    # sqlite | redis
  db_path: "bavish_memory.db"         # only used when backend: sqlite
  redis_url: "redis://localhost:6379" # overridden by REDIS_URL env var if set
  redis_ttl_seconds: 604800           # 7 days — sessions auto-expire in Redis
  history_limit: 10                   # total messages to load per session
  context_window: 6                   # last N messages to include in prompt context
  content_preview_chars: 200          # max chars per message in context summary

# ── Neo4j (code graph RAG) ────────────────────────────────────
neo4j:
  enabled: false                      # flip to true once graph is ready
  uri: "${NEO4J_URI}"
  user: "${NEO4J_USER}"
  password: "${NEO4J_PASSWORD}"
  max_hops: 3                         # depth of CALLS traversal
  max_entities: 3                     # max entities extracted per query
  result_limit: 20                    # max rows returned per entity

# ── FastAPI backend ───────────────────────────────────────────
server:
  host: "0.0.0.0"
  port: 8000
  reload: true
  log_level: "warning"                # uvicorn log level
  startup_timeout: 30                 # seconds main.py waits for backend to be ready

# ── Streamlit UI ──────────────────────────────────────────────
ui:
  port: 8501
  headless: false                     # set true when deploying to a server
  layout: "centered"                  # centered | wide
  page_icon: "🤖"
  avatars:
    user: "🧑"
    assistant: "🤖"

# ── LangGraph routing ─────────────────────────────────────────
graph:
  routing:
    default_route: "direct"         # direct | retrieve  (fallback when no keyword hits)
    simple_msg_max_chars: 150       # messages shorter than this → lc_node (fast path)
    tool_keywords:                  # any of these in message → orchestration subgraph
      - "code"
      - "project"
      - "github"
      - "architecture"
      - "implementation"
      - "how did you"
      - "show me"
      - "neo4j"
      - "graph"
      - "pipeline"
    resume_keywords:                # any of these → resume route (highest priority)
      - "resume"
      - "your resume"
      - "show resume"
      - "see resume"
      - "view resume"
      - "download resume"
      - "share resume"
      - "cv"
      - "curriculum vitae"
  tools:
    enabled: true
    timeout: 10                     # seconds before tool call is abandoned

# ── Knowledge base ────────────────────────────────────────────
# Add anything you want the bot to know and answer from.
# For longer docs (SOPs, bios, guides), drop .md/.txt files into the
# folder specified by `files_dir` — they are loaded automatically at startup.
knowledge:
  files_dir: "knowledge"          # path relative to project root; set to "" to disable

  projects:
    - name: "Bavish Bot"
      description: >
        A personal AI agent that represents me online — built with LangGraph,
        Claude (Anthropic), FastAPI, Redis, and a Neo4j code graph. Deployed on
        Telegram and as a web UI. Talks to recruiters, engineers, and curious people.
      tech: ["LangGraph", "LangChain", "Claude", "Neo4j", "FastAPI", "Redis", "Streamlit"]
      github: ""                  # optional link

    # Add more projects below:
    # - name: "Project Name"
    #   description: "What it does and why."
    #   tech: ["Python", "..."]
    #   github: "https://github.com/..."

  experience:
    - role: "AI Engineer (OPT)"
      company: "Cal State East Bay — MS CS Program"
      period: "2023 – present"
      highlights:
        - "Built LLM-powered pipelines using LangGraph, LangChain, and Anthropic Claude."
        - "Designed RAG systems with Neo4j, MilvusDB, and LlamaIndex."
        - "Deployed agents with FastAPI, Redis, and Streamlit on cloud infra."

    # Add more experience below:
    # - role: "..."
    #   company: "..."
    #   period: "..."
    #   highlights:
    #     - "..."

  faqs:
    - q: "Are you available for full-time roles?"
      a: "Yes — I'm on F-1 OPT and actively looking for full-time AI Engineer positions."
    - q: "Where are you located?"
      a: "San Francisco Bay Area, CA. Open to hybrid or remote."
    - q: "What's your notice period / when can you start?"
      a: "I can start immediately."

    # Add more FAQs below:
    # - q: "..."
    #   a: "..."

  sops: []
  # sops is for short free-text SOPs you want the bot to follow or reference.
  # For longer SOPs, put them as .md files in the knowledge/ folder instead.
  # Example:
  # sops:
  #   - title: "How to answer salary questions"
  #     content: "Be honest. My target range is $X–$Y. I'm flexible for the right role."

# ── GitHub integration ────────────────────────────────────────
# Live data is fetched via the GitHub REST API when a user asks about
# repos, contributions, or GitHub profile.
# GITHUB_TOKEN is optional but strongly recommended (increases rate limit
# from 60 to 5000 req/hour). Add it to .env as GITHUB_TOKEN=ghp_...
github:
  enabled: true
  url: "https://github.com/Bavishsaireddy"
  username: "bavishsaireddy"        # ← your GitHub username
  token: "${GITHUB_TOKEN}"          # optional — set in .env
  max_repos: 6                      # how many repos to surface
  show_languages: true              # include language breakdown per repo
  profile_keywords:                 # messages containing any of these trigger the profile node
    - "github"
    - "repo"
    - "repository"
    - "repositories"
    - "open source"
    - "contributions"
    - "stars"
    - "pull request"
    - "commits"

